services:
  radio-spectrum:
    image: nginx:alpine
    container_name: radio-spectrum
    networks:
      - traefik_network
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_network"
      - "traefik.http.routers.radio-spectrum.entrypoints=web,websecure"
      - "traefik.http.routers.radio-spectrum.rule=Host(`radio.yourdomain.com`)"
      - "traefik.http.services.radio-spectrum.loadbalancer.server.port=80"
      - "traefik.http.routers.radio-spectrum.tls=true"
      - "traefik.http.routers.radio-spectrum.tls.certresolver=leresolver"
    restart: unless-stopped

networks:
  traefik_network:
    external: true
